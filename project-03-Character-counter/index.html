<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 03: Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="counter-container">
        <h2>Character Counter</h2>
        <textarea id="textarea" placeholder="Type your text here..." maxlength="150"></textarea>
        
        <div class="counter-stats">
            <p>Total Characters: <span id="total-counter">0</span></p>
            <p>Remaining: <span id="remaining-counter">150</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
