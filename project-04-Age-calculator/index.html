<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 04: Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <h2>Age Calculator</h2>
        
        <div class="input-group">
            <label for="birthdate">Enter your Date of Birth:</label>
            <input type="date" id="birthdate">
            <button id="btn-calculate">Calculate Age</button>
        </div>

        <div class="result-display">
            <div class="result-box"><span id="years">--</span><p>Years</p></div>
            <div class="result-box"><span id="months">--</span><p>Months</p></div>
            <div class="result-box"><span id="days">--</span><p>Days</p></div>
        </div>
        
        <p id="error-message" class="error"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
