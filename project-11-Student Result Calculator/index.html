<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Student Result Calculator</h2>
    <input type="number" id="bangla" placeholder="Bangla Marks">
    <input type="number" id="english" placeholder="English Marks">
    <input type="number" id="math" placeholder="Math Marks">
    <button id="btn">Calculate Result</button>
    <div id="result">
        Total: 0 <br>
        Average: 0 <br>
        Grade: -
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
